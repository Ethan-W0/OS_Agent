spring.application.name=cjb_Agent
server.port=8080

# ===== 默认 LLM 配置（可通过 /api/config/model 运行时覆盖）=====
agent.llm.base-url=https://api.openai.com/v1
agent.llm.api-key=your-api-key-here
agent.llm.model-name=gpt-4o
agent.llm.timeout-seconds=60

# ===== SSH 连接池配置 =====
agent.ssh.connect-timeout=10000
agent.ssh.heartbeat-interval=30000
agent.ssh.max-connections=10
agent.ssh.command-timeout=60

# ===== 安全风控配置 =====
agent.security.confirmation-timeout-seconds=120
agent.security.enable-risk-intercept=true

# ===== WebSocket 配置 =====
spring.websocket.max-text-message-size=65536

# ===== 日志 =====
logging.level.com.ran.cjb_agent=DEBUG
logging.level.dev.langchain4j=INFO
logging.level.org.bsc.langgraph4j=INFO

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
