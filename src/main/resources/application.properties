spring.application.name=cjb_Agent
server.port=8080

# ===== MySQL 数据源 =====
spring.datasource.url=jdbc:mysql://localhost:3306/os_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=200602
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== 默认 LLM 配置（可通过 /api/config/model 运行时覆盖）=====
agent.llm.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
agent.llm.api-key=sk-800437dd6a04479cb233792a53c16b1a
agent.llm.model-name=qwen-plus
agent.llm.timeout-seconds=60

# ===== SSH 连接池配置 =====
agent.ssh.connect-timeout=10000
agent.ssh.heartbeat-interval=30000
agent.ssh.max-connections=10
agent.ssh.command-timeout=60

# ===== 安全风控配置 =====
agent.security.confirmation-timeout-seconds=120
agent.security.enable-risk-intercept=true

# ===== WebSocket 配置 =====
spring.websocket.max-text-message-size=65536

# ===== 日志 =====
logging.level.com.ran.cjb_agent=DEBUG
logging.level.dev.langchain4j=INFO
logging.level.org.bsc.langgraph4j=INFO

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
